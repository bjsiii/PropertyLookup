<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Property Card Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #e8c96d;
    --accent2: #4fa3e0;
    --text: #e8eaf0;
    --text-muted: #7a8299;
    --ma: #e8c96d;
    --ri: #4fa3e0;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: linear-gradient(135deg, #0f1117 0%, #1a1f30 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .header-title span { color: var(--accent); }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  .state-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .state-btn {
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    padding: 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    transition: all 0.2s ease;
    text-align: center;
  }

  .state-btn .state-sub {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    font-weight: 500;
    margin-top: 2px;
    opacity: 0.7;
  }

  .state-btn.active-ma {
    border-color: var(--ma);
    background: rgba(232, 201, 109, 0.08);
    color: var(--ma);
  }

  .state-btn.active-ri {
    border-color: var(--ri);
    background: rgba(79, 163, 224, 0.08);
    color: var(--ri);
  }

  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 14px 44px 14px 16px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 18px;
    pointer-events: none;
  }

  .county-section { margin-bottom: 8px; }

  .county-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 4px 6px;
    font-weight: 600;
  }

  .towns-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .town-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: all 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .town-card:active, .town-card:hover {
    background: var(--surface2);
    border-color: var(--accent);
    transform: translateX(2px);
  }

  .town-card.ri-card:active, .town-card.ri-card:hover {
    border-color: var(--ri);
  }

  .town-name { font-weight: 500; font-size: 15px; }

  .town-system {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 400;
  }

  .town-arrow {
    color: var(--text-muted);
    font-size: 18px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .tag {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-right: 8px;
  }

  .tag-patriot { background: rgba(232, 201, 109, 0.15); color: var(--ma); }
  .tag-vision  { background: rgba(79, 163, 224, 0.15);  color: var(--ri); }
  .tag-tyler   { background: rgba(120, 190, 140, 0.15); color: #7bc48c; }
  .tag-nereval { background: rgba(200, 130, 200, 0.15); color: #d89fd8; }
  .tag-gis     { background: rgba(200, 130, 80, 0.15);  color: #e0a070; }
  .tag-other   { background: rgba(150,150,150,0.12);    color: #aaa; }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .no-results-icon { font-size: 36px; margin-bottom: 10px; }

  .tip-bar {
    background: rgba(232, 201, 109, 0.07);
    border: 1px solid rgba(232, 201, 109, 0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 18px;
    line-height: 1.5;
  }

  .tip-bar strong { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="header-label">Ben's Lookup</div>
  <div class="header-title">Property Card <span>Lookup</span></div>
</header>

const tagClass = {
  "Patriot Properties": "tag-patriot",
  "Vision GIS":         "tag-vision",
  "NEReval":            "tag-nereval",
  "MapGeo GIS":         "tag-gis",
  "Tighe & Bond GIS":   "tag-gis",
  "AxisGIS":            "tag-gis",
  "AssessedValues2":    "tag-other",
  "MapsOnline":         "tag-other",
  "Town of Barnstable": "tag-other",
  "Town of Brewster":   "tag-other",
  "City of Boston":     "tag-other",
};

let currentState = 'MA';

function setState(state) {
  currentState = state;
  document.getElementById('btn-ma').className = 'state-btn' + (state === 'MA' ? ' active-ma' : '');
  document.getElementById('btn-ri').className = 'state-btn' + (state === 'RI' ? ' active-ri' : '');
  document.getElementById('searchBox').value = '';
  renderTowns('');
}

function filterTowns() {
  renderTowns(document.getElementById('searchBox').value.trim().toLowerCase());
}

function renderTowns(query) {
  const isRI = currentState === 'RI';
  const counties = data[currentState];
  let html = '';
  let totalShown = 0;

  for (const county of counties) {
    const filtered = county.towns.filter(t => t.name.toLowerCase().includes(query));
    if (filtered.length === 0) continue;
    totalShown += filtered.length;

    html += `<div class="county-section">`;
    if (!query) html += `<div class="county-label">${county.county}</div>`;
    html += `<div class="towns-grid">`;

    for (const t of filtered) {
      const tag = tagClass[t.system] || 'tag-other';
      const cardClass = isRI ? 'town-card ri-card' : 'town-card';
      html += `
        <a class="${cardClass}" href="${t.url}" target="_blank" rel="noopener">
          <div>
            <div class="town-name">${t.name}</div>
            <div class="town-system">${t.system}</div>
          </div>
          <div style="display:flex;align-items:center">
            <span class="tag ${tag}">${t.system.split(' ')[0]}</span>
            <span class="town-arrow">›</span>
          </div>
        </a>`;
    }

    html += `</div></div>`;
  }

  if (totalShown === 0) {
    html = `<div class="no-results">
      <div class="no-results-icon">🔍</div>
      <div>No towns found for "<strong>${query}</strong>"</div>
    </div>`;
  }

  document.getElementById('townList').innerHTML = html;
}

renderTowns('');
</script>
