<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Property Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2a2f45;
    --blue: #4fc3f7;
    --orange: #f97316;
    --text: #e8eaf0;
    --muted: #6b7280;
    --font-head: 'Bebas Neue', sans-serif;
    --font-body: 'IBM Plex Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100%;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .header-title {
    font-family: var(--font-head);
    font-size: 26px;
    letter-spacing: 0.06em;
    color: var(--text);
    line-height: 1;
  }
  .header-title span { color: var(--blue); }

  /* ── Layout ── */
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }

  /* ── State Toggle ── */
  .state-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .state-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: 2px solid transparent;
    color: var(--muted);
    padding: 12px 16px;
    cursor: pointer;
    font-family: var(--font-head);
    font-size: 20px;
    letter-spacing: 0.06em;
    transition: all 0.15s;
    text-align: center;
    border-radius: 4px;
    user-select: none;
  }

  .state-btn .state-sub {
    display: block;
    font-family: var(--font-body);
    font-size: 9px;
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-top: 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .state-btn:hover { background: var(--surface2); color: var(--text); }

  .state-btn.active-ma {
    border-color: var(--blue);
    border-bottom-color: var(--blue);
    background: rgba(79,195,247,0.07);
    color: var(--blue);
  }

  .state-btn.active-ri {
    border-color: var(--orange);
    border-bottom-color: var(--orange);
    background: rgba(249,115,22,0.07);
    color: var(--orange);
  }

  /* ── Tip bar ── */
  .tip-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.6;
    letter-spacing: 0.03em;
  }
  .tip-bar strong { color: var(--blue); font-weight: 600; }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 40px 12px 14px;
    border-radius: 4px;
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.03em;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  /* ── County sections ── */
  .county-section { margin-bottom: 6px; }

  .county-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 4px 5px;
  }

  /* ── Town cards ── */
  .towns-grid { display: flex; flex-direction: column; gap: 4px; }

  .town-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 4px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    color: var(--text);
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
  }

  .town-card:hover, .town-card:active {
    background: var(--surface2);
    border-color: var(--blue);
    transform: translateX(2px);
  }

  .town-card.ri-card { border-left-color: var(--orange); }
  .town-card.ri-card:hover, .town-card.ri-card:active {
    border-color: var(--orange);
  }

  .town-name {
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.03em;
  }

  .town-system {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .town-arrow {
    color: var(--muted);
    font-size: 16px;
    flex-shrink: 0;
    margin-left: 8px;
    transition: transform 0.12s;
  }
  .town-card:hover .town-arrow { transform: translateX(3px); color: var(--blue); }
  .town-card.ri-card:hover .town-arrow { color: var(--orange); }

  /* ── Tags ── */
  .tag {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    margin-right: 8px;
  }

  .tag-patriot { background: rgba(249,115,22,0.12); color: var(--orange); }
  .tag-vision  { background: rgba(79,195,247,0.12);  color: var(--blue); }
  .tag-nereval { background: rgba(167,139,250,0.12); color: #a78bfa; }
  .tag-gis     { background: rgba(52,211,153,0.12);  color: #34d399; }
  .tag-other   { background: rgba(107,114,128,0.15); color: var(--muted); }

  /* ── No results ── */
  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.05em;
  }
  .no-results-icon { font-size: 32px; margin-bottom: 10px; }
</style>
</head>

const tagClass = {
  "Patriot Properties": "tag-patriot",
  "Vision GIS":         "tag-vision",
  "NEReval":            "tag-nereval",
  "MapGeo GIS":         "tag-gis",
  "Tighe & Bond GIS":   "tag-gis",
  "AxisGIS":            "tag-gis",
  "AppGeo GIS":         "tag-gis",
  "AssessedValues2":    "tag-other",
  "MapsOnline":         "tag-other",
  "CSC EPAS":           "tag-other",
  "MainStreetMaps":     "tag-other",
  "Town Portal":        "tag-other",
  "City of Boston":     "tag-other",
};

let currentState = 'MA';

function setState(state) {
  currentState = state;
  document.getElementById('btn-ma').className = 'state-btn' + (state==='MA' ? ' active-ma' : '');
  document.getElementById('btn-ri').className = 'state-btn' + (state==='RI' ? ' active-ri' : '');
  document.getElementById('searchBox').value = '';
  renderTowns('');
}

function filterTowns() {
  renderTowns(document.getElementById('searchBox').value.trim().toLowerCase());
}

function renderTowns(query) {
  const isRI = currentState === 'RI';
  const counties = data[currentState];
  let html = '';
  let totalShown = 0;
  for (const county of counties) {
    const filtered = county.towns.filter(t => t.name.toLowerCase().includes(query));
    if (filtered.length === 0) continue;
    totalShown += filtered.length;
    html += `<div class="county-section">`;
    if (!query) html += `<div class="county-label">${county.county}</div>`;
    html += `<div class="towns-grid">`;
    for (const t of filtered) {
      const tag = tagClass[t.system] || 'tag-other';
      const cardClass = isRI ? 'town-card ri-card' : 'town-card';
      html += `<a class="${cardClass}" href="${t.url}" target="_blank" rel="noopener">
        <div><div class="town-name">${t.name}</div><div class="town-system">${t.system}</div></div>
        <div style="display:flex;align-items:center">
          <span class="tag ${tag}">${t.system.split(' ')[0]}</span>
          <span class="town-arrow">›</span>
        </div></a>`;
    }
    html += `</div></div>`;
  }
  if (totalShown === 0) {
    html = `<div class="no-results"><div class="no-results-icon">🔍</div><div>No towns found for "<strong>${query}</strong>"</div></div>`;
  }
  document.getElementById('townList').innerHTML = html;
}

renderTowns('');
</script>
